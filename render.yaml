services:
  - type: web
    name: qa-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this value in your Render dashboard
      - key: DATABASE_URL
        sync: false # Set this value in your Render dashboard (e.g. from Neon)
